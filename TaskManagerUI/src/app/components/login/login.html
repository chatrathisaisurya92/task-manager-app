<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <img src="assets/logo.png" alt="Task Monitor Logo" />
      <h2>
        <span class="word-dark">Task</span>
        <span class="word-blue">Monitor</span>
      </h2>
    </div>

    <!-- Username -->
    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        [(ngModel)]="username"
        placeholder="Enter username"
        autocomplete="username"
      />
    </div>

    <!-- Password -->
    <div class="form-group password-field">
      <label for="password">Password</label>
      <input
        id="password"
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        placeholder="Enter password"
        autocomplete="current-password"
      />

      <!-- Eye Icon SVG -->
      <span class="eye-icon" (click)="showPassword = !showPassword">

        <!-- Eye OPEN — password visible -->
        <svg *ngIf="showPassword"
          xmlns="http://www.w3.org/2000/svg"
          width="18" height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>

        <!-- Eye CLOSED — password hidden -->
        <svg *ngIf="!showPassword"
          xmlns="http://www.w3.org/2000/svg"
          width="18" height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>

      </span>
    </div>

    <!-- Remember Me -->
    <div class="remember">
      <input type="checkbox" id="remember" [(ngModel)]="rememberMe" />
      <label for="remember">Keep me signed in</label>
    </div>

    <!-- Login Button -->
    <button
      class="login-btn"
      (click)="login()"
      [disabled]="loading || !username || !password"
    >
      <span *ngIf="!loading" class="btn-content">
        Login
        <svg xmlns="http://www.w3.org/2000/svg"
          width="16" height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
      </span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <!-- Error Message -->
    <div class="error" *ngIf="error">
      <svg xmlns="http://www.w3.org/2000/svg"
        width="14" height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <!-- Footer -->
    <div class="card-footer">
      © 2026 Task Monitor. All rights reserved.
    </div>

  </div>
</div>
