<div class="container">
  <h1>Task Manager</h1>

  <!-- Add Button -->
  <button mat-flat-button color="primary" (click)="showForm = !showForm">
    {{ showForm ? 'Cancel' : '+ Add Task' }}
  </button>

  <!-- Add/Edit Form -->
 <div class="form-card" *ngIf="showForm">
  <h3>{{ editMode ? 'Edit Task' : 'New Task' }}</h3>

  <!-- Title -->
  <input type="text" placeholder="Title" [(ngModel)]="newTask.title" />

  <!-- Description -->
  <textarea placeholder="Description" [(ngModel)]="newTask.description"></textarea>

  <!-- Priority -->
  <select [(ngModel)]="newTask.priority">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>

  <!-- Assigned User -->
  <select [(ngModel)]="newTask.assignedTo">
    <option value="">Select User</option>
    <option *ngFor="let user of users" [ngValue]="user.id">
      {{ user.username }}
    </option>
  </select>

  <!-- Deadline -->
  <input type="date" [(ngModel)]="newTask.deadline" />

  <!-- Save -->
  <button mat-flat-button color="primary" (click)="saveTask()">
    {{ editMode ? 'Update Task' : 'Save Task' }}
  </button>
</div>
  <!-- Task List -->
  <div class="task-card" *ngFor="let task of tasks">
    <div class="task-header">
      <input type="checkbox"
        [checked]="task.isCompleted"
        (change)="toggleComplete(task)" />

      <span [class.completed]="task.isCompleted">{{ task.title }}</span>

      <span [ngClass]="['priority', task.priority.toLowerCase()]">
        {{ task.priority }}
      </span>
    </div>

    <p class="description">{{ task.description }}</p>
    <p class="assigned">
  Assigned to: {{ task.assignedUser?.username }}
</p>

<p class="deadline">
  Deadline: {{ task.deadline | date:'mediumDate' }}
</p>

    <div class="task-actions">
      <!-- Edit -->
      <button mat-stroked-button color="primary" (click)="editTask(task)">
        Edit
      </button>

      <!-- Delete -->
      <button mat-stroked-button color="warn" (click)="deleteTask(task.id)">
        Delete
      </button>
    </div>
  </div>

  <p *ngIf="tasks.length === 0" class="no-tasks">No tasks yet. Add one!</p>
</div>
