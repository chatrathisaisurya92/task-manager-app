<div class="container">
  <h1>Task Manager</h1>

  <button class="btn-add" (click)="showForm = !showForm">
    {{ showForm ? 'Cancel' : '+ Add Task' }}
  </button>

  <!-- Add/Edit Form -->
  <div class="form-card" *ngIf="showForm">
    <h3>{{ editMode ? 'Edit Task' : 'New Task' }}</h3>

    <input type="text" placeholder="Title" [(ngModel)]="newTask.title" />
    <textarea placeholder="Description" [(ngModel)]="newTask.description"></textarea>

    <select [(ngModel)]="newTask.priority">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>

    <button class="btn-save" (click)="saveTask()">
      {{ editMode ? 'Update Task' : 'Save Task' }}
    </button>
  </div>

  <!-- Task List -->
  <div class="task-card" *ngFor="let task of tasks">
    <div class="task-header">
      <input type="checkbox"
        [checked]="task.isCompleted"
        (change)="toggleComplete(task)" />
      <span [class.completed]="task.isCompleted">{{ task.title }}</span>
      <span class="priority" [class]="task.priority.toLowerCase()">
        {{ task.priority }}
      </span>
    </div>
    <p class="description">{{ task.description }}</p>
    <div class="task-actions">
      <button class="btn-edit" (click)="editTask(task)">Edit</button>
      <button class="btn-delete" (click)="deleteTask(task.id)">Delete</button>
    </div>
  </div>

  <p *ngIf="tasks.length === 0" class="no-tasks">No tasks yet. Add one!</p>
</div>
